databases:
  - name: anagrams-live-db
    plan: free

services:
  - type: web
    name: anagrams-live
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anagrams-live-db
          property: connectionString
